seed: 42
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
max_length: 256
batch_size: 1
epochs: 1
finetune_mode: lora

lora:
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
  r: 16
  alpha: 16
  dropout: 0.05
  bias: none

optimizer:
  lr: 0.0001
  weight_decay: 0.01
  warmup_steps: 50

dataset:
  name: arc
  train_split: train
  eval_split: validation
  answer_marker: "Answer: "

verbalizer:
  A: "A"
  B: "B"
  C: "C"
  D: "D"

objective:
  name: erm
  mix_weight: 0.5

augment:
  enabled: false
  preset: standard
  clean_ratio: 0.5
  n_perturb_per_clean: 1
  train_budget: medium
  presets:
    cheap:
      clean_ratio: 0.75
      n_perturb_per_clean: 1
      train_budget: small
    standard:
      clean_ratio: 0.5
      n_perturb_per_clean: 1
      train_budget: medium
    strong:
      clean_ratio: 0.25
      n_perturb_per_clean: 2
      train_budget: medium

# R3F 再弱化一档（相较 v2_fix）
r3f:
  enabled: false
  preset: standard
  noise_std: 0.005
  lambda: 0.05
  apply_layer: embeddings
  detach_target: true
  presets:
    cheap:
      noise_std: 0.003
      lambda: 0.03
    standard:
      noise_std: 0.005
      lambda: 0.05
    strong:
      noise_std: 0.01
      lambda: 0.1

smart:
  enabled: false
  preset: standard
  K: 3
  step_size: 0.001
  eps: 0.01
  norm: l2
  lambda: 1.0
  detach_target: true

perturbation:
  method: synonym
  replace_ratio: 0.1
  num_sentences: 1
  eval_budgets: [small, medium, large]
  cache_root: cache/perturb_fields

spectral:
  enabled: false
  # 你指定：gamma=0.1
  gamma: 0.1
  # tau 这里建议用更平滑的门控，先用 0.2（比 0.1 更不容易训练不稳/过惩罚）
  tau: 0.2
  beta_ema: 0.9
  n_refresh: 10
  t_pi: 10
  alpha: 0.05
  beta: 0.1
  eta: 0.0
  sigma_noise: 0.01
  stability: true
  top_k: 10
  # 给所有 spectral run 做 warmup + ramp（按总步数比例）
  warmup_ratio: 0.2
  ramp_ratio: 0.2

logging:
  backend: jsonl
  wandb:
    project: icml_wcr_spectral
    entity: null
    group: null
    name: null
    tags: []
    mode: offline
    dir: ./wandb
    log_every_steps: 50
    watch_model: false
    save_code: true
    resume: allow
  save_dir: results/arc/erm/seed42
  metrics_path: results/arc/erm/seed42/metrics.jsonl
  final_metrics_path: results/arc/erm/seed42/metrics.json
  matrix_path: results/arc/erm/seed42/matrix.json
  log_every: 10





